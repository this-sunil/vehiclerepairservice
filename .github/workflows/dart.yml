name: Flutter CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Setup Keystore (if exists)
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            mkdir -p android/app
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            echo "storePassword=$KEYSTORE_PASSWORD" > android/key.properties
            echo "keyAlias=$KEY_ALIAS" >> android/key.properties
            echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
            echo "storeFile=keystore.jks" >> android/key.properties
          else
            echo "⚠️ Keystore not provided. APK will be unsigned."
          fi

      - name: Build APK
        run: flutter build apk --release --build-number=${{ github.run_number }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    env:
      IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
      IOS_PROVISION_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install Dependencies
        run: |
          flutter pub get
          cd ios
          pod install --repo-update
          cd ..

      - name: Setup iOS Signing (if exists)
        run: |
          if [ -n "$IOS_P12_BASE64" ]; then
            mkdir -p ios/certs
            echo "$IOS_P12_BASE64" | base64 --decode > ios/certs/cert.p12
            echo "$IOS_PROVISION_BASE64" | base64 --decode > ios/certs/profile.mobileprovision
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp ios/certs/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
            security import ios/certs/cert.p12 -k ~/Library/Keychains/login.keychain -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign
          else
            echo "⚠️ iOS signing not provided. IPA will be unsigned."
          fi

      - name: Build iOS
        run: |
          if [ -n "$IOS_P12_BASE64" ]; then
            flutter build ios --release --build-number=${{ github.run_number }}
          else
            flutter build ios --release --no-codesign --build-number=${{ github.run_number }}
          fi

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ios-release.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: ios-release.ipa
