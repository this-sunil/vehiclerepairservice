name: Flutter CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOTENV_CONTENT: ${{ secrets.ENV_FILE }}

    steps:
      # 📥 Checkout repo using v5 (Node 24)
      - name: Checkout code
        uses: actions/checkout@v5

      # 🧰 Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 📦 Cache dependencies using v5 (Node 24)
      - name: Cache Flutter dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      # 🔑 Create .env file from GitHub Secrets
      - name: Create .env file
        run: |
          echo "$DOTENV_CONTENT" > .env

      # 📦 Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 🎨 Check formatting
      - name: Verify formatting
        run: dart format .

      # 🔍 Analyze code
      - name: Analyze project
        run: flutter analyze --fatal-infos --fatal-warnings

      # 🧪 Run tests
      - name: Run tests
        run: flutter test

      # 🏗 Build APK (Debug)
      - name: Build APK
        run: flutter build apk --debug
        
       # 🏗 Build iOS app (IPA)
      - name: Build iOS IPA
        run: flutter build ios --debug

      # 📤 Upload IPA artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: build/ios/ipa/*.ipa

      # 📤 Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
