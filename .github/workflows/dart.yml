name: Flutter CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  # --- Android Build ---
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true # Turning cache back on for speed; usually 'already watching' is a local issue

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --build-number=${{ github.run_number }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk

  # --- iOS Build ---
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install Dependencies
        run: |
          flutter pub get
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS (Frameworks)
        # We use --no-codesign here, but we build the 'ios' target properly
        run: flutter build ios --release --no-codesign --build-number=${{ github.run_number }}

      - name: Create Archive & IPA (Unsigned)
        run: |
          mkdir -p Payload
          # Ensure the path to Runner.app is correct
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ios-release.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: ios-release.ipa
