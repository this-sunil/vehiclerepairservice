name: Flutter CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  # --- Android Build ---
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install Dependencies
        run: flutter pub get

      # --- Setup optional Android Keystore ---
      - name: Setup Keystore
        if: secrets.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          mkdir -p android/app
          echo ${{ secrets.ANDROID_KEYSTORE_BASE64 }} | base64 --decode > android/app/keystore.jks
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Build APK
        run: flutter build apk --release --build-number=${{ github.run_number }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk

  # --- iOS Build ---
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install Dependencies
        run: |
          flutter pub get
          cd ios
          pod install --repo-update
          cd ..

      # --- Setup optional iOS signing ---
      - name: Setup iOS Signing
        if: secrets.IOS_P12_BASE64 != ''
        run: |
          mkdir -p ios/certs
          echo "${{ secrets.IOS_P12_BASE64 }}" | base64 --decode > ios/certs/cert.p12
          echo "${{ secrets.IOS_PROVISION_BASE64 }}" | base64 --decode > ios/certs/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp ios/certs/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          security import ios/certs/cert.p12 -k ~/Library/Keychains/login.keychain -P "${{ secrets.IOS_P12_PASSWORD }}" -T /usr/bin/codesign

      - name: Build iOS
        run: |
          if [ -n "${{ secrets.IOS_P12_BASE64 }}" ]; then
            flutter build ios --release --build-number=${{ github.run_number }}
          else
            flutter build ios --release --no-codesign --build-number=${{ github.run_number }}
          fi

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ios-release.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: ios-release.ipa
