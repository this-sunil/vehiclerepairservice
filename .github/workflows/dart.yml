build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # IMPORTANT: Must get dependencies before Pods
      - name: Get dependencies
        run: flutter pub get

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      # Ensure CocoaPods is using the correct Ruby environment
      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update
        # Note: No need to 'cd ..' manually if you use 'working-directory' 
        # but this works too.

      - name: Build iOS
        run: flutter build ios --release --no-codesign --build-number=${{ github.run_number }}

      # Improved Packaging Logic
      - name: Package IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload
          zip -r ios-release.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: ios-release.ipa
