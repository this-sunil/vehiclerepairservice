name: Flutter CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Setup Keystore
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            mkdir -p android/app
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            echo "storePassword=$KEYSTORE_PASSWORD" > android/key.properties
            echo "keyAlias=$KEY_ALIAS" >> android/key.properties
            echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
            echo "storeFile=app/upload-keystore.jks" >> android/key.properties
          else
            echo "⚠️ Keystore not provided. APK will be unsigned."
          fi

      - name: Build APK
        run: flutter build apk --release --build-number=${{ github.run_number }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
      IOS_PROVISION_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}
      IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Install Dependencies
        run: |
          flutter pub get
          cd ios
          pod install --repo-update
          cd ..

      - name: Setup iOS Signing
        run: |
          if [ -n "$IOS_P12_BASE64" ]; then
            # Create a temporary keychain to avoid UI prompts
            KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
            KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

            # Import certificate
            echo "$IOS_P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
            security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

            # Install provisioning profile
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            echo "$IOS_PROVISION_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          else
            echo "⚠️ iOS signing not provided."
          fi

      - name: Build IPA
        run: |
          if [ -n "$IOS_P12_BASE64" ]; then
            # Requires an ExportOptions.plist in your ios/ folder for full automation
            flutter build ipa --release --build-number=${{ github.run_number }} --export-method=app-store
          else
            flutter build ios --release --no-codesign --build-number=${{ github.run_number }}
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/ipa/*.ipa
