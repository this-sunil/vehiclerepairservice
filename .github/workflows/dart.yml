name: Flutter CI/CD

on:
push:
branches:
- main
pull_request:
branches:
- main

jobs:
build-android:
name: Android Build
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      channel: stable
      cache: true

  - name: Create .env file
    run: echo "${{ secrets.ENV_FILE }}" > .env

  - name: Install dependencies
    run: flutter pub get

  - name: Verify formatting
    run: dart format --output=none --set-exit-if-changed .

  - name: Analyze project
    run: flutter analyze

  - name: Run tests
    run: flutter test

  - name: Build APK (Debug)
    run: flutter build apk --debug

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: app-debug-apk
      path: build/app/outputs/flutter-apk/app-debug.apk
```

build-ios:
name: iOS Build
runs-on: macos-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      channel: stable
      cache: true

  - name: Create .env file
    run: echo "${{ secrets.ENV_FILE }}" > .env

  - name: Install dependencies
    run: flutter pub get

  - name: Analyze project
    run: flutter analyze

  - name: Build iOS (No Code Sign)
    run: flutter build ios --debug --no-codesign

  - name: Upload Runner App
    uses: actions/upload-artifact@v4
    with:
      name: ios-debug-app
      path: build/ios/iphoneos/Runner.app
```
