name: Flutter CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env
      - run: flutter pub get

      # Step 1: Build the .app (This works without certificates)
      - name: Build iOS App Bundle
        run: flutter build ios --release --no-codesign

      # Step 2: Manually create the .ipa structure (The "Secret Sauce")
      - name: Create IPA File
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload
          cd build/ios/iphoneos
          zip -r app-release.ipa Payload
          
      # Step 3: Upload the actual .ipa file
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: build/ios/iphoneos/app-release.ipa
          if-no-files-found: error
