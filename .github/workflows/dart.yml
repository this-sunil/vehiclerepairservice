name: Flutter CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 🧰 Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 📦 Cache dependencies
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      # 📦 Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 🎨 Check formatting
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      # 🔍 Analyze code
      - name: Analyze project
        run: flutter analyze

      # 🧪 Run tests
      - name: Run tests
        run: flutter test

      # 🏗 Build APK (Debug)
      - name: Build APK
        run: flutter build apk --debug

      # 📤 Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
