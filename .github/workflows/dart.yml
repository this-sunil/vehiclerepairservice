name: Flutter CI/CD (Node 24 Optimized)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- JOB 1: Android (Linux) ---
  build-android:
    runs-on: ubuntu-latest # Uses Ubuntu 24.04 by default
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Latest v6 (Node 24 native)

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true # Uses actions/cache@v5 internally

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v7 # v7 supports faster direct uploads
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  # --- JOB 2: iOS (macOS) ---
  build-ios:
    runs-on: macos-latest # Uses macOS 15/16
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Build iOS IPA
        run: flutter build ipa --release --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v7
        with:
          name: app-release-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
